<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire Match V37.5</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:20px;
  margin:0;
}
.wrap{
  max-width:700px;
  margin:0 auto;
}
h2{
  color:#ffd400;
  text-align:center;
  margin-bottom:20px;
}
label{
  display:block;
  margin-top:16px;
  font-weight:bold;
}
input, textarea, select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
  font-size:16px;
}
textarea{
  min-height:90px;
  resize:vertical;
}
.choice-group{
  margin-top:10px;
}
.choice-btn{
  display:block;
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  background:#222;
  color:#fff;
  border:2px solid #444;
  text-align:left;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  box-sizing:border-box;
}
.choice-btn.active{
  background:#ffd400;
  color:#000;
  border-color:#ffd400;
}
.send{
  margin-top:24px;
  width:100%;
  padding:14px;
  background:#ffd400;
  color:#000;
  font-weight:bold;
  border:none;
  border-radius:12px;
  font-size:17px;
  cursor:pointer;
}
.note{
  margin-top:12px;
  color:#cfcfcf;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">

  <h2 id="titreMatch">Réponse Match</h2>

  <label for="joueur">Prénom du joueur</label>
  <select id="joueur">
    <option value="">Choisir un joueur</option>
  </select>

  <label>Présence</label>
  <div class="choice-group" id="presenceGroup">
    <div class="choice-btn" onclick="selectPresence(this, 'Présent')">Présent</div>
    <div class="choice-btn" onclick="selectPresence(this, 'Absent')">Absent</div>
  </div>

  <div id="domicileNote" class="note" style="display:none;text-align:left;">
    Match à domicile : aucun transport à renseigner.
  </div>

  <div id="transportBloc" style="display:none;">
    <label>Transport</label>
    <div class="choice-group" id="transportGroup">
      <div class="choice-btn" onclick="selectTransport(this, 'Direct')">Je me rends directement au match</div>
      <div class="choice-btn" onclick="selectTransport(this, 'Gymnase')">Je pars du gymnase</div>
      <div class="choice-btn" onclick="selectTransport(this, 'Besoin')">J’ai besoin d’un transport</div>
    </div>

    <label for="places">Places disponibles</label>
    <input id="places" type="number" min="0" placeholder="Exemple : 2">
  </div>

  <label for="commentaire">Commentaire</label>
  <textarea id="commentaire" placeholder="Ajoute un commentaire si besoin"></textarea>

  <button class="send" onclick="envoyerFormulaire()">Envoyer la réponse</button>

  <button class="send" style="background:#333;color:#fff;border:2px solid #555;margin-top:10px;" onclick="annulerFormulaire()">Annuler</button>

  <div class="note">Après envoi, retour automatique à l’application.</div>

</div>

<script>
let presenceValue = "";
let transportValue = "";

function isAwayMatch() {
  const type = getParam("type")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toLowerCase();

  return ["e", "ext", "exterieur", "extérieur"].includes(type);
}

function resetTransport() {
  transportValue = "";
  document.querySelectorAll("#transportGroup .choice-btn").forEach(btn => btn.classList.remove("active"));
  document.getElementById("places").value = "";
}

function getParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param) || "";
}

function chargerJoueurs() {
  const joueursParam = getParam("joueurs");
  const select = document.getElementById("joueur");
  select.innerHTML = "<option value=''>Choisir un joueur</option>";

  if (!joueursParam) return;

  const liste = decodeURIComponent(joueursParam)
    .split("|")
    .map(x => x.trim())
    .filter(Boolean);

  liste.forEach(j => {
    const option = document.createElement("option");
    option.value = j;
    option.textContent = j;
    select.appendChild(option);
  });
}

window.onload = function() {
  const display = getParam("display") || getParam("match");
  if (display) {
    document.getElementById("titreMatch").innerText = "Réponse - " + display;
  }

  if (!isAwayMatch()) {
    document.getElementById("domicileNote").style.display = "block";
  }

  chargerJoueurs();
};

function selectPresence(el, value) {
  presenceValue = value;
  document.querySelectorAll("#presenceGroup .choice-btn").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  const transportBloc = document.getElementById("transportBloc");

  if (value === "Présent" && isAwayMatch()) {
    transportBloc.style.display = "block";
  } else {
    transportBloc.style.display = "none";
    resetTransport();
  }
}

function selectTransport(el, value) {
  transportValue = value;
  document.querySelectorAll("#transportGroup .choice-btn").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
}

let sending = false;

function envoyerFormulaire() {
  if (sending) return;
  sending = true;

  const btn = document.querySelector(".send");
  if (btn) {
    btn.disabled = true;
    btn.innerText = "Envoi en cours...";
  }
  const data = {
    match: getParam("match"),
    equipe: getParam("equipe"),
    prenom: document.getElementById("joueur").value,
    presence: presenceValue,
    transport: transportValue,
    places: document.getElementById("places").value || "",
    commentaire: document.getElementById("commentaire").value
  };

  fetch("https://script.google.com/macros/s/AKfycbwsAagDE1Hvc7iAZSkkJPzDn9Q4INQuZdphxUEPrwz65veoF3_sEJ_LzSVsYMZLsAGiwA/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.body.innerHTML = "<h2 style='color:#ffd400;text-align:center;margin-top:50px;'>Réponse envoyée 👍<br>Retour...</h2>";
    setTimeout(() => {
      try { window.close(); } catch(e) {}
      window.location.href = "https://alexlub37.github.io/";
    }, 1200);
  })
  .catch(() => {
    sending = false;
    const btn = document.querySelector(".send");
    if (btn) {
      btn.disabled = false;
      btn.innerText = "Envoyer la réponse";
    }
    alert("Erreur d'envoi ❌");
  });
}

function annulerFormulaire(){
  try { window.close(); } catch(e) {}
  window.location.href = "https://alexlub37.github.io/";
}
</script>

</body>
</html>
