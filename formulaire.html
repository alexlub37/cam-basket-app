<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire Match V35</title>

<style>
body {background:#000;color:#fff;font-family:Arial;padding:20px;}
h2 {color:gold;}
label {display:block;margin-top:15px;font-weight:bold;}
input, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:none;
}
button {
  margin-top:20px;
  width:100%;
  padding:12px;
  background:gold;
  font-weight:bold;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<h2 id="titreMatch">Réponse Match</h2>

<label>Prénom du joueur</label>
<select id="joueur"></select>

<label>Présence</label>
<input type="radio" name="presence" value="Présent"> Présent
<input type="radio" name="presence" value="Absent"> Absent

<label>Transport</label>
<input type="radio" name="transport" value="Direct"> Direct match
<input type="radio" name="transport" value="Gymnase"> Départ gymnase
<input type="radio" name="transport" value="Besoin"> Besoin transport

<label>Places disponibles</label>
<input id="places">

<label>Commentaire</label>
<textarea id="commentaire"></textarea>

<button onclick="envoyerFormulaire()">Envoyer la réponse</button>

<script>

function getParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param) || "";
}

window.onload = function() {
  try{chargerJoueurs();}catch(e){}
  const match = getParam("match");
  if(match){
    document.getElementById("titreMatch").innerText = "Réponse - " + match;
  }
};


function chargerJoueurs() {
  const joueursParam = getParam("joueurs");
  if (!joueursParam) return;
  const liste = decodeURIComponent(joueursParam).split("|");
  const select = document.getElementById("joueur");
  select.innerHTML = "<option value=''>Choisir un joueur</option>";
  liste.forEach(j => {
    const option = document.createElement("option");
    option.value = j;
    option.textContent = j;
    select.appendChild(option);
  });
}


function envoyerFormulaire() {

  const data = {
    match: getParam("match"),
    equipe: getParam("equipe"),
    prenom: document.getElementById("joueur").value,
    presence: document.querySelector('input[name="presence"]:checked')?.value || "",
    transport: document.querySelector('input[name="transport"]:checked')?.value || "",
    places: document.getElementById("places").value,
    commentaire: document.getElementById("commentaire").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzQNFB_3WxXKDtwqoapiFU6QV-vobX9IZJptnh9oComst-DoqCD7zugQQfw6o8KEUgi/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    document.body.innerHTML = "<h2 style='color:gold;text-align:center;margin-top:50px;'>Réponse envoyée 👍<br>Merci !</h2>";
  })
  .catch(() => {
    alert("Erreur ❌");
  });
}
</script>

</body>
</html>
