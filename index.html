<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM Basket Montrichard</title>

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}

header{
  position:relative;
  padding:20px;
  color:white;
  background:black;
  overflow:hidden;
}

header::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("logo.png") center/contain no-repeat;
  opacity:0.25;
}

.header-content{position:relative;z-index:2;}

h1{margin:0;font-size:22px}

.version{
  position:absolute;
  top:15px;
  right:15px;
  background:yellow;
  color:black;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
}

button{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.card{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

.item{background:white;margin:10px;padding:10px;border-radius:10px;cursor:pointer}
</style>
</head>

<body>

<header>
  <div class="version">V7</div>

  <div class="header-content">
    <h1>CAM Basket Montrichard</h1>
    <div>Équipes • Joueurs • Matchs • Saison active</div>
    <button onclick="reloadData()">Actualiser</button>
  </div>
</header>

<div id="content"></div>

<script>

const SHEET_ID = "1CbySOHD6ykiSSIWvptNF6vs2AtJPmRHigaE1h73VRoA";

async function fetchData(sheet){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${sheet}&tqx=out:json`;
  const res = await fetch(url);
  const txt = await res.text();
  const json = JSON.parse(txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1));
  return json.table.rows.map(r => r.c.map(c => c ? c.v : ""));
}

async function reloadData(){
  const matchs = await fetchData("MATCHS");

  let html = "";

  matchs.forEach(m=>{
    if(!m[1]) return;

    html += `
      <div class="item">
        <b>${m[1]}</b><br>
        ${m[2]} ${m[3]}<br>
        ${m[4]}<br>
        ${m[6]} - ${m[9]}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

reloadData();

</script>

</body>
</html>
