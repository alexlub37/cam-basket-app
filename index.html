<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM Basket Montrichard</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{padding:15px;border-bottom:1px solid #222}
.top{display:flex;justify-content:space-between;align-items:center}
.logo{width:60px}
.version{background:#ffd400;color:#000;padding:5px 10px;border-radius:20px;font-size:12px}
.title{font-size:20px;font-weight:bold}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

button{
padding:12px;
border-radius:12px;
border:1px solid #ffd400;
background:#111;
color:#fff;
font-weight:bold;
}

button.active{
background:#ffd400;
color:#000;
}

.container{padding:15px}
.card{background:#111;padding:15px;border-radius:15px;margin-bottom:10px}
</style>
</head>

<body>

<header>
<div class="top">
<img src="Image PNG.png" class="logo">
<div class="title">CAM Basket<br>Montrichard</div>
<div class="version">V19</div>
</div>

<div class="buttons">
<button class="active">Équipes</button>
<button>Bureau</button>
<button>Bénévoles</button>
<button>Mettre à jour</button>
</div>
</header>

<div class="container">

<div class="card">Saison active : 2026</div>

<div class="card">⚠️ Cette version est uniquement le bloc boutons refait proprement.<br>
➡️ À intégrer dans ta V16 pour garder tes liens Google Sheets.</div>

</div>

</body>
</html>
