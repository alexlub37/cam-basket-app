<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM Basket Montrichard</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}

header{padding:15px;border-bottom:1px solid #222}
.top{display:flex;align-items:center;justify-content:space-between}
.logo{width:60px}
.title{font-size:18px;font-weight:bold}
.version{background:#ffd400;color:#000;padding:5px 10px;border-radius:20px;font-size:12px}

.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
button{padding:10px;border-radius:10px;border:1px solid #ffd400;background:#111;color:#fff;font-weight:bold}
button.active{background:#ffd400;color:#000}

.container{padding:15px}
.card{background:#111;padding:15px;border-radius:15px;margin-bottom:10px;border:1px solid #333}
.search{width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#000;color:#fff;margin-bottom:10px}
</style>
</head>

<body>

<header>
<div class="top">
<img src="Image PNG.png" class="logo">
<div class="title">CAM Basket<br>Montrichard</div>
<div class="version">V17</div>
</div>

<div class="buttons">
<button class="active" onclick="showTeams()">Équipes</button>
<button onclick="showBureau()">Bureau</button>
<button onclick="showBenevoles()">Bénévoles</button>
<button onclick="reloadData()">MAJ</button>
</div>
</header>

<div class="container" id="content">

<div class="card" id="season">Chargement saison...</div>

<input class="search" placeholder="Rechercher une équipe">

<div id="teams"></div>

</div>

<script>
// === CONFIG GOOGLE SHEET (repris V6) ===
const SHEET_ID = "TON_ID_GOOGLE_SHEET";
const API_KEY = "TA_CLE_API";

async function fetchSheet(name){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${name}?key=${API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.values || [];
}

async function reloadData(){
  const data = await fetchSheet("PARAMETRES");
  document.getElementById("season").innerHTML = "Saison active : " + data[1][0];
}

// === NAVIGATION ===
function showTeams(){
  document.getElementById("content").innerHTML = "<div class='card'>Chargement équipes...</div>";
}

function showBureau(){
  document.getElementById("content").innerHTML = "<div class='card'>Bureau en cours...</div>";
}

function showBenevoles(){
  document.getElementById("content").innerHTML = "<div class='card'>Bénévoles en cours...</div>";
}

// INIT
reloadData();
</script>

</body>
</html>
